name: goreleaser

on:
  push:
    tags:
      - 'v*'
  create:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Tag or ref to release'
        required: true
        default: 'main'

concurrency:
  group: ${{ github.workflow }}-${{ inputs.ref || github.ref_name || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  goreleaser:
    if: ${{ github.event_name != 'create' || (github.ref_type == 'tag' && startsWith(github.ref_name, 'v')) }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref || github.ref_name }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: stable

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
